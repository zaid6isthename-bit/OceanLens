version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: oceanlens
      POSTGRES_PASSWORD: oceanlens
      POSTGRES_DB: oceanlens
    ports:
      - '5432:5432'
    volumes:
      - db-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - '6379:6379'

volumes:
  db-data:
